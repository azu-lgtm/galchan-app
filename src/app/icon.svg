<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C6D0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8A0B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A0B9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF0F3;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  <!-- Background rounded square - kusumi pink -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Soft inner glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="white" opacity="0.12"/>
  <!-- ガ character -->
  <text x="256" y="345" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="300" font-weight="800" fill="url(#text-grad)" text-anchor="middle" dominant-baseline="middle">ガ</text>
  <!-- Subtle top shine -->
  <rect width="512" height="200" rx="108" fill="white" opacity="0.06"/>
  <!-- Small sparkle accent -->
  <circle cx="400" cy="110" r="12" fill="white" opacity="0.5"/>
  <circle cx="420" cy="130" r="6" fill="white" opacity="0.35"/>
</svg>
